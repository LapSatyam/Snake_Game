<!doctype html>
<html lang="en" class="bg-zinc-900 text-white font-[gilroy]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Tailwind CSS -->
    <link href="../src/output.css" rel="stylesheet" />
  </head>
  <body>
    <main class="h-screen w-full p-0.5">
      <nav class="w-full h-10 p-2 mt-1 mb-1.5 flex items-center justify-center">
        <ul class="w-full flex justify-between font-semibold text-lg">
          <!-- <li class="li">High Score: <span class="font-bold" id="full-score">0</span></li> -->
          <li class="li">Score: <span class="font-bold" id="score">0</span></li>
          <li class="li">Time: <span class="font-bold" id="time">0:0</span></li>
        </ul>
      </nav>

      <div id="board" class=""></div>

      <div
        id="modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/70"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <div
          class="w-[90%] max-w-md rounded-3xl border border-white/10 bg-zinc-800 p-6 shadow-2xl"
        >
          <h2 id="modal-title" class="text-2xl font-bold">Snake Game</h2>
          <p id="modal-description" class="mt-2 text-zinc-300">
            Use the arrow keys to Move the snake and avoid crashing into the
            wall.
          </p>

          <div class="mt-5 flex justify-end">
            <button
              id="start-btn"
              class="rounded-xl cursor-pointer bg-emerald-500 px-4 py-2 font-semibold text-black hover:bg-emerald-400 transition-all duration-300"
              type="button"
            >
              Start Game
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Game Script -->
    <script src="./script.js"></script>
  </body>
</html>
